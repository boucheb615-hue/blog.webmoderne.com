<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="#090935"/>
  
  <!-- Robot head (doodle style) -->
  <rect x="100" y="120" width="100" height="80" rx="12" fill="none" stroke="#db1a1a" stroke-width="3" stroke-dasharray="6,3"/>
  <circle cx="130" cy="155" r="12" fill="#db1a1a" opacity="0.6"/>
  <circle cx="170" cy="155" r="12" fill="#db1a1a" opacity="0.6"/>
  <circle cx="130" cy="155" r="5" fill="#ffffff" opacity="0.8"/>
  <circle cx="170" cy="155" r="5" fill="#ffffff" opacity="0.8"/>
  <path d="M130 178 Q150 190 170 178" fill="none" stroke="#db1a1a" stroke-width="2"/>
  
  <!-- Antenna -->
  <line x1="150" y1="120" x2="150" y2="90" stroke="#db1a1a" stroke-width="2"/>
  <circle cx="150" cy="85" r="6" fill="#db1a1a" opacity="0.8"/>
  
  <!-- Robot body -->
  <rect x="110" y="200" width="80" height="60" rx="6" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.7"/>
  
  <!-- Arms -->
  <path d="M110 220 Q80 215 70 230" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.6"/>
  <path d="M190 220 Q220 215 230 230" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.6"/>
  
  <!-- Legs -->
  <line x1="130" y1="260" x2="120" y2="300" stroke="#db1a1a" stroke-width="2" opacity="0.6"/>
  <line x1="170" y1="260" x2="180" y2="300" stroke="#db1a1a" stroke-width="2" opacity="0.6"/>
  
  <!-- Decision flow arrows -->
  <path d="M260 160 L340 160" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.5"/>
  <path d="M260 200 L340 200" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.5"/>
  <path d="M260 240 L340 240" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.5"/>
  
  <!-- 5 process boxes (Perception, Planification, Execution, Validation, Iteration) -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db1a1a" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- Step 1: Perception -->
  <rect x="360" y="70" width="140" height="45" rx="8" fill="none" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="97" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">1. Vision</text>
  
  <!-- Step 2: Planification -->
  <rect x="360" y="135" width="140" height="45" rx="8" fill="none" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="162" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">2. Plan</text>
  
  <!-- Step 3: Execution -->
  <rect x="360" y="200" width="140" height="45" rx="8" fill="none" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="227" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">3. Execute</text>
  
  <!-- Step 4: Validation -->
  <rect x="360" y="265" width="140" height="45" rx="8" fill="none" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="292" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">4. Validate</text>
  
  <!-- Step 5: Iteration (loop back arrow) -->
  <rect x="360" y="330" width="140" height="45" rx="8" fill="none" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="430" y="357" font-family="monospace" font-size="13" fill="#ffffff" text-anchor="middle" opacity="0.9">5. Iterate</text>
  
  <!-- Loop arrow from step 5 back to step 1 -->
  <path d="M500 352 Q540 352 540 200 Q540 90 500 90" fill="none" stroke="#db1a1a" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.5"/>
  
  <!-- Connection arrows between steps -->
  <line x1="430" y1="115" x2="430" y2="135" stroke="#db1a1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="180" x2="430" y2="200" stroke="#db1a1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="245" x2="430" y2="265" stroke="#db1a1a" stroke-width="1.5" opacity="0.5"/>
  <line x1="430" y1="310" x2="430" y2="330" stroke="#db1a1a" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Output: completed task -->
  <rect x="580" y="150" width="160" height="100" rx="8" fill="#db1a1a" opacity="0.1" stroke="#db1a1a" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="660" y="190" font-family="monospace" font-size="12" fill="#db1a1a" text-anchor="middle" opacity="0.8">47 secondes</text>
  <text x="660" y="215" font-family="monospace" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.7">vs 2 heures</text>
  <text x="660" y="240" font-family="monospace" font-size="11" fill="#ffffff" text-anchor="middle" opacity="0.5">humain</text>
  
  <!-- Arrow from execution to output -->
  <path d="M500 222 L580 200" fill="none" stroke="#ffffff" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.4"/>
  
  <!-- Sparkle doodles -->
  <path d="M580 80 L583 70 L586 80 L596 83 L586 86 L583 96 L580 86 L570 83 Z" fill="#db1a1a" opacity="0.4"/>
  <path d="M300 340 L302 334 L304 340 L310 342 L304 344 L302 350 L300 344 L294 342 Z" fill="#ffffff" opacity="0.2"/>
  
  <!-- Small decorative dots -->
  <circle cx="60" cy="60" r="3" fill="#db1a1a" opacity="0.3"/>
  <circle cx="740" cy="350" r="3" fill="#db1a1a" opacity="0.3"/>
  <circle cx="300" cy="50" r="2" fill="#ffffff" opacity="0.2"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" rx="12" fill="#090935"/>
  
  <!-- Book (knowledge source) -->
  <rect x="80" y="150" width="80" height="100" rx="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <rect x="85" y="145" width="80" height="100" rx="4" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="95" y1="170" x2="150" y2="170" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="95" y1="185" x2="150" y2="185" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="95" y1="200" x2="130" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  <line x1="95" y1="215" x2="145" y2="215" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>
  
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#db1a1a"/>
    </marker>
  </defs>
  
  <!-- Arrow from book to brain -->
  <path d="M180 200 L250 200" fill="none" stroke="#db1a1a" stroke-width="3" marker-end="url(#arrow2)"/>
  
  <!-- Brain shape (doodle style) -->
  <ellipse cx="370" cy="190" rx="100" ry="80" fill="none" stroke="#db1a1a" stroke-width="3" stroke-dasharray="8,4"/>
  <path d="M320 160 Q340 140 370 155 Q400 140 420 160" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.5"/>
  <path d="M310 200 Q340 180 370 195 Q400 180 430 200" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.5"/>
  <path d="M320 230 Q350 215 370 225 Q390 215 420 230" fill="none" stroke="#db1a1a" stroke-width="2" opacity="0.5"/>
  
  <!-- Neural connections inside brain -->
  <circle cx="345" cy="175" r="5" fill="#db1a1a" opacity="0.6"/>
  <circle cx="395" cy="175" r="5" fill="#db1a1a" opacity="0.6"/>
  <circle cx="370" cy="210" r="5" fill="#db1a1a" opacity="0.6"/>
  <circle cx="340" cy="230" r="4" fill="#db1a1a" opacity="0.4"/>
  <circle cx="400" cy="230" r="4" fill="#db1a1a" opacity="0.4"/>
  <line x1="345" y1="175" x2="395" y2="175" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="345" y1="175" x2="370" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="395" y1="175" x2="370" y2="210" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="210" x2="340" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  <line x1="370" y1="210" x2="400" y2="230" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  
  <!-- "73%" label inside brain -->
  <text x="370" y="195" font-family="monospace" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.7">73%</text>
  
  <!-- Arrow from brain to output -->
  <path d="M480 190 L550 190" fill="none" stroke="#db1a1a" stroke-width="3" marker-end="url(#arrow2)"/>
  
  <!-- Two outputs: Memorization vs Understanding -->
  <rect x="570" y="100" width="180" height="60" rx="8" fill="none" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="660" y="125" font-family="monospace" font-size="11" fill="#888" text-anchor="middle">Memorisation</text>
  <text x="660" y="148" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.5">Perroquet</text>
  
  <rect x="570" y="210" width="180" height="60" rx="8" fill="#db1a1a" opacity="0.1" stroke="#db1a1a" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="660" y="235" font-family="monospace" font-size="11" fill="#db1a1a" text-anchor="middle">Comprehension</text>
  <text x="660" y="258" font-family="monospace" font-size="14" fill="#ffffff" text-anchor="middle" opacity="0.9">Apprentissage</text>
  
  <!-- Checkmark on understanding, X on memorization -->
  <text x="740" y="130" font-family="monospace" font-size="18" fill="#888" opacity="0.5">x</text>
  <text x="740" y="240" font-family="monospace" font-size="18" fill="#db1a1a" opacity="0.8">OK</text>
  
  <!-- Doodle sparkles -->
  <path d="M200 80 L203 70 L206 80 L216 83 L206 86 L203 96 L200 86 L190 83 Z" fill="#db1a1a" opacity="0.3"/>
  <path d="M700 330 L702 324 L704 330 L710 332 L704 334 L702 340 L700 334 L694 332 Z" fill="#ffffff" opacity="0.2"/>
  
  <!-- Small dots -->
  <circle cx="50" cy="50" r="3" fill="#db1a1a" opacity="0.3"/>
  <circle cx="750" cy="50" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="300" cy="350" r="2" fill="#db1a1a" opacity="0.2"/>
</svg>
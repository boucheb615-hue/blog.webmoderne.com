  <line x1="432" y1="115" x2="468" y2="115" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="432" y1="130" x2="468" y2="130" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

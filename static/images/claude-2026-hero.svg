  <text x="450" y="200" font-family="monospace" font-size="14" fill="#db1a1a" text-anchor="middle" opacity="0.8">1M</text>
  
  <!-- Code brackets -->
  <text x="250" y="210" font-family="monospace" font-size="48" fill="#ffffff" text-anchor="middle" opacity="0.8">&lt;/&gt;</text>
  

  <path d="M150 130 Q130 120 140 100 Q150 80 130 75" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  <path d="M300 150 Q320 130 310 110 Q300 90 320 80" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.4"/>
  
